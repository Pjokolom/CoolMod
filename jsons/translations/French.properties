Although unwanted, war is a constant of this world, and it is regrettable that it must fall on us both. = Bien que non désirée, la guerre est une constante de ce monde, et il est regrettable qu’elle doive s’abattre sur nous deux.
Italy is far from a stranger of war! I will show you that we are far from pushovers! = L'Italie est loin d'être étrangère à la guerre! Je vais vous montrer que nous sommes loin d'être des proies faciles!
It is sad that my forces were not enough to defend this nation... Addio, amico mio. = C'est triste que mes forces n'aient pas été suffisantes pour défendre cette nation... Addio, amico mio.
Saluti, you walk upon the land of the former Roman Empire. I am Victor Emmanuel II, King Of Italy. Do you rule with benevolence, or absolute tyranny? = Saluti, vous foulez les terres de l'ancien Empire romain. Je suis Victor-Emmanuel II, roi d'Italie. Régnez-vous avec bienveillance ou tyrannie absolue?
Our cultures have much to share, and this deal proves it. = Nos cultures ont beaucoup à partager, et cet accord le prouve.
Rinascimento = Renaissance
Grim days await you, Victor Emmanuel III, King of Italy. Coming to the throne upon the assassination of your father, Italy would soon be plunged into the calamity of the First World War. Heeding to the popular will, you rallied the Italian forces against the forward march of Vienna, taking to the front with your queen to dispense both moral and medical support. But though victorious, Italy's losses would be too great, and the road would for paved for the country's next great threat: Benito Mussolini and his fascism. Luckily, his shadow that loomed upon you and your beautiful nation would not last forever, and soon you indirectly paved the way for a new Italy, one that would seek cooperation with its neighbours instead of competition driven by the culture of the Rinascimento of many centuries ago. = Des jours sombres vous attendent, Victor-Emmanuel III, roi d'Italie. Monté sur le trône après l'assassinat de votre père, l'Italie allait bientôt être plongée dans les affres de la Première Guerre mondiale. Obéissant à la volonté populaire, vous avez rallié les forces italiennes contre l'avancée de Vienne, partant au front avec votre reine pour apporter un soutien moral et médical. Mais malgré la victoire, les pertes de l'Italie seraient trop lourdes, et la voie serait ouverte à la prochaine grande menace pour le pays : Benito Mussolini et son fascisme. Heureusement, son ombre qui planait sur vous et votre belle nation ne durerait pas éternellement, et vous avez bientôt indirectement ouvert la voie à une nouvelle Italie, une Italie qui privilégierait la coopération avec ses voisins plutôt que la concurrence nourrie par la culture de la Renaissance d'il y a plusieurs siècles.
Tireless monarch, the frontlines of Italy once more lay bare and unprotected. Can you rally both soldier and ship to the defense of her borders, ensuring that Italy remains unassailable? Will your nation bring a new Rinascimento to bring new prosperity for her people? Can you build a civilization that will stand the test of time? = Monarque infatigable, les lignes de front de l'Italie sont à nouveau nues et sans protection. Saurez-vous mobiliser soldats et navires pour défendre ses frontières et garantir que l'Italie reste inattaquable? Votre nation inaugurera-t-elle une nouvelle Renaissance pour apporter une nouvelle prospérité à son peuple? Saurez-vous bâtir une civilisation qui résistera à l'épreuve du temps?
